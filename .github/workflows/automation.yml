name: Automation Test

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Fix permission
        run: chmod +x node_modules/.bin/mocha

      - name: Run test
        run: ./node_modules/.bin/mocha tests/homeTest.js